# Production Nginx config for the CollectionGeek frontend container.
# Serves the static build and proxies the WorkOS user_management API so
# the browser sees same-origin requests (avoids CORS on the AuthKit token
# exchange). Backend API requests are still expected to hit their own
# host directly — the runtime apiBaseUrl in config.js controls that.

# --- Cache policy by URL -------------------------------------------------
#
# Cache-Control is computed from $request_uri so every response gets the
# right header set at the server level — putting `add_header` inside a
# location block would silently drop the inherited security headers
# (CSP, X-Frame-Options, etc.) because of nginx's add_header inheritance
# rule: any `add_header` in a child context erases ALL inherited ones.
#
# Policy:
#   /assets/*           → content-hashed by Vite, safe to pin forever.
#   /favicon.svg        → cache moderately; not hashed, but rarely changes.
#   everything else     → no-store. index.html and /config.js must always
#                          be fresh so the browser picks up new asset hashes
#                          and new runtime env values on the next page load.
map $request_uri $cg_cache_control {
    default                "no-store";
    "~^/assets/"           "public, max-age=31536000, immutable";
    "~^/favicon\.svg$"     "public, max-age=86400";
}

server {
    listen 80;

    # --- Security headers --------------------------------------------------
    #
    # Content-Security-Policy locks down what the browser will execute and
    # where it will send data. The zero-knowledge encryption story depends
    # on this — without a strict script-src, an XSS-injected script could
    # call encrypt/decrypt through the in-memory DEK handle.
    #
    # Directives, by purpose:
    #   default-src 'none'  → deny everything not explicitly allowed.
    #   script-src 'self'   → only our own bundles + runtime config.js.
    #     'sha256-…='       → pins the inline theme-detection script in
    #                          index.html (pre-paint dark-mode guard).
    #                          The hash MUST match that script's content;
    #                          `frontend/scripts/check-csp-hash.mjs` runs
    #                          as a `prebuild` step and fails the build
    #                          with the corrected hash if it drifts.
    #   style-src 'unsafe-inline'  → Radix UI sets inline style attrs for
    #                                 popover/dropdown positioning; CSS-only
    #                                 alternative would mean rewriting the
    #                                 primitives. Inline-style injection is
    #                                 much less dangerous than inline-script.
    #   connect-src wss://*.convex.cloud https://*.convex.cloud
    #                      → reactive Convex queries use a WebSocket.
    #     Note: if the Go backend is hosted on a different origin than this
    #     Nginx (i.e. apiBaseUrl points off-origin), add that origin here
    #     or fetches will be blocked.
    #   frame-ancestors 'none' / form-action 'self' / base-uri 'self' /
    #     object-src 'none'  → standard hardening against clickjacking,
    #     form hijack, base-tag injection, and legacy plugins.
    add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'sha256-zPxgfGXPT/z3G4G7vfMZ7SSDGhIbZpnUMykck0PmtM0='; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' wss://*.convex.cloud https://*.convex.cloud; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'" always;

    # Cheap wins, complementary to CSP:
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # HSTS is left off here so dev compose over http://localhost keeps working;
    # add at the load-balancer / ingress layer in production HTTPS deploys.

    # Cache header value comes from the $cg_cache_control map above. Stays
    # at the server level so it doesn't fight with header inheritance.
    add_header Cache-Control $cg_cache_control always;

    # --- Compression -------------------------------------------------------
    # On for text-based assets — Vite's main JS bundle compresses ~3× with
    # gzip. Vary: Accept-Encoding so intermediary caches respect the encoding.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/css
        text/plain
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # --- WorkOS auth proxy -------------------------------------------------
    # Keeps AuthKit's token exchange same-origin so CSP's connect-src 'self'
    # covers it without listing api.workos.com.
    location /user_management/ {
        proxy_pass https://api.workos.com/user_management/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.workos.com;
        proxy_set_header X-Real-IP $remote_addr;
        # Preserve the client IP chain and original scheme for any upstream
        # rate-limiting / audit logic that consults forwarded headers.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- SPA fallback ------------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}

name: Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/frontend
  GITOPS_REPO: collectiongeek/collectiongeek-gitops

jobs:
  # ---------------------------------------------------------
  # Detect which services have changed
  # ---------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
              - 'convex/**'

  # ---------------------------------------------------------
  # Build, scan, and push backend image
  # ---------------------------------------------------------
  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.short-sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: short-sha
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:latest
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ---------------------------------------------------------
  # Build, scan, and push frontend image (test environment vars baked in)
  # ---------------------------------------------------------
  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.short-sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: short-sha
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:latest
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ---------------------------------------------------------
  # Update GitOps repo with new image tag(s) for test
  # ---------------------------------------------------------
  update-gitops:
    needs: [changes, backend, frontend]
    if: always() && (needs.backend.result == 'success' || needs.frontend.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gitops-repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_REPO_PAT }}
          path: gitops-repo

      - name: Update backend image tag
        if: needs.backend.result == 'success'
        run: |
          TAG="${{ needs.backend.outputs.image-tag }}"
          FILE="gitops-repo/charts/backend/values-test.yaml"
          echo "Updating backend test image tag to: ${TAG}"
          sed -i "s|^  tag:.*|  tag: ${TAG}|" "${FILE}"
          echo "Updated ${FILE}:"
          grep "tag:" "${FILE}"

      - name: Update frontend image tag
        if: needs.frontend.result == 'success'
        run: |
          TAG="${{ needs.frontend.outputs.image-tag }}"
          FILE="gitops-repo/charts/frontend/values-test.yaml"
          echo "Updating frontend test image tag to: ${TAG}"
          sed -i "s|^  tag:.*|  tag: ${TAG}|" "${FILE}"
          echo "Updated ${FILE}:"
          grep "tag:" "${FILE}"

      - name: Commit and push
        run: |
          cd gitops-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          # Build a descriptive commit message
          SERVICES=""
          if [[ "${{ needs.backend.result }}" == "success" ]]; then
            SERVICES="backend(${{ needs.backend.outputs.image-tag }})"
          fi
          if [[ "${{ needs.frontend.result }}" == "success" ]]; then
            if [[ -n "$SERVICES" ]]; then
              SERVICES="${SERVICES}, frontend(${{ needs.frontend.outputs.image-tag }})"
            else
              SERVICES="frontend(${{ needs.frontend.outputs.image-tag }})"
            fi
          fi

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "deploy(test): update ${SERVICES}"
            git push
            echo "✅ GitOps repo updated for test environment"
          fi

  # ---------------------------------------------------------
  # Notify on success or failure
  # ---------------------------------------------------------
  notify:
    needs: [changes, backend, frontend, update-gitops]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Determine overall status
        id: status
        run: |
          if [[ "${{ needs.backend.result }}" == "failure" || "${{ needs.frontend.result }}" == "failure" || "${{ needs.update-gitops.result }}" == "failure" ]]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "emoji=❌" >> "$GITHUB_OUTPUT"
            echo "text=Build & Push Failed" >> "$GITHUB_OUTPUT"
          elif [[ "${{ needs.backend.result }}" == "success" || "${{ needs.frontend.result }}" == "success" ]]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "emoji=✅" >> "$GITHUB_OUTPUT"
            echo "text=Build & Push Succeeded — Test deploy triggered" >> "$GITHUB_OUTPUT"
          else
            echo "result=skipped" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack
        if: steps.status.outputs.result != 'skipped'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ steps.status.outputs.emoji }} ${{ steps.status.outputs.text }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ steps.status.outputs.emoji }} *${{ steps.status.outputs.text }}*\n*Repo:* ${{ github.repository }}\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}\n*Backend:* ${{ needs.backend.result || 'skipped' }} ${{ needs.backend.outputs.image-tag || '' }}\n*Frontend:* ${{ needs.frontend.result || 'skipped' }} ${{ needs.frontend.outputs.image-tag || '' }}\n*GitOps Update:* ${{ needs.update-gitops.result || 'skipped' }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }

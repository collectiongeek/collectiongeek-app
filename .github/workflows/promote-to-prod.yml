name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      services:
        description: "Which service(s) to promote"
        required: true
        type: choice
        options:
          - backend
          - frontend
          - both
      image-tag:
        description: "Image tag to promote (7-char commit SHA — check test deployment)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/frontend
  GITOPS_REPO: collectiongeek/collectiongeek-gitops

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Validate image tag format
        run: |
          TAG="${{ inputs.image-tag }}"
          if [[ ! "$TAG" =~ ^[a-f0-9]{7,40}$ ]]; then
            echo "::error::Image tag must be a commit SHA (7–40 hex chars). Got: $TAG"
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------------
      # Verify the image(s) built and tested for this SHA exist.
      # The same image goes to production — no rebuild needed.
      # -------------------------------------------------------
      - name: Verify backend image exists
        if: inputs.services == 'backend' || inputs.services == 'both'
        run: |
          IMAGE="${{ env.BACKEND_IMAGE }}:${{ inputs.image-tag }}"
          echo "Checking for ${IMAGE}…"
          if ! docker manifest inspect "${IMAGE}" > /dev/null 2>&1; then
            echo "::error::Backend image not found: ${IMAGE}"
            exit 1
          fi
          echo "✅ Found ${IMAGE}"

      - name: Verify frontend image exists
        if: inputs.services == 'frontend' || inputs.services == 'both'
        run: |
          IMAGE="${{ env.FRONTEND_IMAGE }}:${{ inputs.image-tag }}"
          echo "Checking for ${IMAGE}…"
          if ! docker manifest inspect "${IMAGE}" > /dev/null 2>&1; then
            echo "::error::Frontend image not found: ${IMAGE}"
            exit 1
          fi
          echo "✅ Found ${IMAGE}"

      # -------------------------------------------------------
      # Update the gitops repo with the promoted tag(s).
      # The same SHA tag is used for both test and production —
      # environment config is injected at runtime via K8s ConfigMap.
      # -------------------------------------------------------
      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_REPO_PAT }}
          path: gitops-repo

      - name: Update production image tag(s)
        run: |
          TAG="${{ inputs.image-tag }}"

          if [[ "${{ inputs.services }}" == "backend" || "${{ inputs.services }}" == "both" ]]; then
            FILE="gitops-repo/charts/backend/values-prod.yaml"
            echo "Updating backend prod tag → ${TAG}"
            sed -i "s|^  tag:.*|  tag: ${TAG}|" "${FILE}"
            grep "tag:" "${FILE}"
          fi

          if [[ "${{ inputs.services }}" == "frontend" || "${{ inputs.services }}" == "both" ]]; then
            FILE="gitops-repo/charts/frontend/values-prod.yaml"
            echo "Updating frontend prod tag → ${TAG}"
            sed -i "s|^  tag:.*|  tag: ${TAG}|" "${FILE}"
            grep "tag:" "${FILE}"
          fi

      - name: Commit and push
        run: |
          cd gitops-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          TAG="${{ inputs.image-tag }}"
          SERVICES="${{ inputs.services }}"

          if git diff --cached --quiet; then
            echo "⚠️ No changes to commit — tags may already be set"
          else
            git commit -m "deploy(prod): promote ${SERVICES} → ${TAG}"
            git push
            echo "✅ GitOps repo updated for production"
          fi

      - name: Notify Slack
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚀 Production Promotion",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚀 *Production Promotion Completed*\n*Services:* ${{ inputs.services }}\n*Image tag:* `${{ inputs.image-tag }}`\n*Triggered by:* ${{ github.actor }}\n\n_Remember: Argo CD requires a manual sync for production._\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }

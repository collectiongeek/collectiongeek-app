version: 2

# Free on public repos. Opens PRs for known-vulnerable / outdated deps
# across every ecosystem in this repo. Grouped to keep PR volume sane.
updates:
  # Root npm (Convex + tooling)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      root-npm:
        patterns: ["*"]
        # Majors arrive as INDIVIDUAL PRs instead — one incompatible major
        # must not poison a whole group (PR #81: typescript 7 vs
        # typescript-eslint's peer range broke a 15-package batch).
        update-types: ["minor", "patch"]

  # Frontend (TypeScript/React/Vite)
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend-npm:
        patterns: ["*"]
        # Majors arrive as INDIVIDUAL PRs instead — one incompatible major
        # must not poison a whole group (PR #81: typescript 7 vs
        # typescript-eslint's peer range broke a 15-package batch).
        update-types: ["minor", "patch"]
    ignore:
      # TS 7 is blocked by typescript-eslint's peer range (ERESOLVE at npm
      # ci). Remove this entry once typescript-eslint declares TS 7 support.
      - dependency-name: typescript
        versions: [">=7"]

  # Backend (Go / Chi)
  - package-ecosystem: gomod
    directory: "/backend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      backend-gomod:
        patterns: ["*"]
        # Majors arrive as INDIVIDUAL PRs instead — one incompatible major
        # must not poison a whole group (PR #81: typescript 7 vs
        # typescript-eslint's peer range broke a 15-package batch).
        update-types: ["minor", "patch"]

  # Dockerfiles (base image bumps)
  - package-ecosystem: docker
    directories:
      - "/backend"
      - "/frontend"
    schedule:
      interval: weekly

  # GitHub Actions used in our workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]
        # Majors arrive as INDIVIDUAL PRs instead — one incompatible major
        # must not poison a whole group (PR #81: typescript 7 vs
        # typescript-eslint's peer range broke a 15-package batch).
        update-types: ["minor", "patch"]
